name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'
            name: 'windows-x64'
          - platform: 'windows-latest'
            args: '--target i686-pc-windows-msvc'
            name: 'windows-x86'
          
          # macOS builds
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macos-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macos-x64'
          
          # Linux x64
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'linux-x64'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc,i686-pc-windows-msvc' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./app

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./app
          tagName: app-v__VERSION__
          releaseName: 'Office Battle Royale v__VERSION__'
          releaseBody: |
            ## Office Battle Royale - Release v__VERSION__
            
            ### Downloads
            - **Windows (64-bit)**: `.msi` or `.exe` installer
            - **Windows (32-bit)**: `.msi` or `.exe` installer  
            - **macOS (Apple Silicon)**: `.dmg` for M1/M2/M3 Macs
            - **macOS (Intel)**: `.dmg` for Intel-based Macs
            - **Linux (64-bit)**: `.AppImage`, `.deb`, or `.rpm`
            
            ### What's New
            See the assets below to download and install this version.
            
            ### Installation Notes
            - **Windows**: Run the installer and follow the prompts
            - **macOS**: Open the `.dmg` and drag to Applications folder
            - **Linux**: Make the `.AppImage` executable or install the `.deb`/`.rpm` package
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Linux ARM builds (ARMv7 and ARM64) - slower but comprehensive
  release-linux-arm:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-unknown-linux-gnu
            name: 'linux-arm64'
          - arch: armv7
            rust_target: armv7-unknown-linux-gnueabihf
            name: 'linux-armv7'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./app

      - name: Build frontend
        run: npm run build
        working-directory: ./app

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Tauri app for ARM
        run: |
          cd app/src-tauri
          cross build --release --target ${{ matrix.rust_target }}
        env:
          CARGO_BUILD_TARGET: ${{ matrix.rust_target }}

      - name: Package ARM build
        run: |
          cd app/src-tauri/target/${{ matrix.rust_target }}/release
          tar -czf office-battle-royale-${{ matrix.name }}.tar.gz office-battle-royale
          
      - name: Upload ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: office-battle-royale-${{ matrix.name }}
          path: app/src-tauri/target/${{ matrix.rust_target }}/release/office-battle-royale-${{ matrix.name }}.tar.gz
